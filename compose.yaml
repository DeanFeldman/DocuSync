services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: documentsync
      POSTGRES_USER: documentsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - documentsync-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documentsync -d documentsync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  documentsync-postgres:
