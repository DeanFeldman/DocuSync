name: DocSync release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements-build.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r apps/api/requirements-build.txt

      - name: Set version from Git tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          npm version $version --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Create installer checksum
        shell: pwsh
        run: |
          Get-FileHash release/v1/*.exe -Algorithm SHA256 |
            ForEach-Object {
              "$($_.Hash)  $($_.Path | Split-Path -Leaf)"
            } |
            Set-Content release/v1/SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem "release/v1" -File |
            Where-Object {
              $_.Extension -eq ".exe" -or
              $_.Name -eq "SHA256SUMS.txt"
            } |
            ForEach-Object {
              $_.FullName
            }

          gh release create "${{ github.ref_name }}" $assets `
            --title "DocSync ${{ github.ref_name }}" `
            --generate-notes